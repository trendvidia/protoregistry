syntax = "proto3";

package protoregistry.v1;

option go_package = "github.com/trendvidia/protoregistry/proto/protoregistry/v1;registrypb";

import "google/protobuf/timestamp.proto";
import "google/protobuf/descriptor.proto";

// RegistryService provides a gRPC API for the proto schema registry.
service RegistryService {
  // Publish compiles and stages a new schema version within a namespace.
  rpc Publish(PublishRequest) returns (PublishResponse);

  // Promote atomically moves all staged versions to current in a namespace.
  rpc Promote(PromoteRequest) returns (PromoteResponse);

  // DiscardStaging clears all staged versions in a namespace.
  rpc DiscardStaging(DiscardStagingRequest) returns (DiscardStagingResponse);

  // Rollback stages a previous version for promotion.
  rpc Rollback(RollbackRequest) returns (RollbackResponse);

  // GetSchema returns metadata for a schema.
  rpc GetSchema(GetSchemaRequest) returns (GetSchemaResponse);

  // ListSchemas lists all schemas in a namespace.
  rpc ListSchemas(ListSchemasRequest) returns (ListSchemasResponse);

  // GetDescriptor returns the compiled FileDescriptorSet for a schema version.
  rpc GetDescriptor(GetDescriptorRequest) returns (GetDescriptorResponse);

  // GetSource returns the original source files for a schema version.
  rpc GetSource(GetSourceRequest) returns (GetSourceResponse);

  // ListNamespaces lists all namespaces.
  rpc ListNamespaces(ListNamespacesRequest) returns (ListNamespacesResponse);

  // CreateNamespace creates a new namespace.
  rpc CreateNamespace(CreateNamespaceRequest) returns (CreateNamespaceResponse);

  // SetNamespaceParent re-parents an existing namespace in the resolution
  // chain. Recorded in an append-only audit log (see decision D9). Gated
  // by the deployment's Authorizer.
  rpc SetNamespaceParent(SetNamespaceParentRequest) returns (SetNamespaceParentResponse);

  // GetRebaseStatus reports, for a child schema's current version, which
  // pinned cross-namespace dependencies are behind the parent's current
  // state. Idempotent and read-only.
  rpc GetRebaseStatus(GetRebaseStatusRequest) returns (GetRebaseStatusResponse);

  // Rebase re-resolves a child schema's parent chain against the parent's
  // current state and publishes a new version. Sources are unchanged; the
  // per-import pins (see decision D3) are refreshed. Gated by the
  // deployment's Authorizer.
  rpc Rebase(RebaseRequest) returns (RebaseResponse);
}

// --- Publish ---

message PublishRequest {
  string namespace_id = 1;
  string schema_id = 2;
  // Source proto files: filename → content.
  map<string, bytes> sources = 3;
  string created_by = 4;
  map<string, string> metadata = 5;
  // When true, allows publishing files that shadow well-known types
  // (e.g., google/protobuf/timestamp.proto). Defaults to false.
  //
  // The server requires the caller to have admin privileges to set this
  // flag; non-admin callers will receive PERMISSION_DENIED.
  bool force = 6;
}

message PublishResponse {
  uint64 version = 1;
  string fingerprint = 2;
  bool no_change = 3;
}

// --- Promote ---

message PromoteRequest {
  string namespace_id = 1;
}

message PromoteResponse {
  repeated PromotedSchema promoted = 1;
}

message PromotedSchema {
  string schema_id = 1;
  uint64 current_version = 2;
}

// --- DiscardStaging ---

message DiscardStagingRequest {
  string namespace_id = 1;
}

message DiscardStagingResponse {}

// --- Rollback ---

message RollbackRequest {
  string namespace_id = 1;
  string schema_id = 2;
  uint64 version = 3;
  // When true, the server bypasses the compat check that would otherwise
  // reject a rollback whose target version is not API-backward-compatible
  // with the current version. Intended for incident response.
  //
  // The server requires the caller to have admin privileges to set this
  // flag; non-admin callers will receive PERMISSION_DENIED.
  bool force = 4;
}

message RollbackResponse {}

// --- GetSchema ---

message GetSchemaRequest {
  string namespace_id = 1;
  string schema_id = 2;
}

message GetSchemaResponse {
  SchemaInfo schema = 1;
}

message SchemaInfo {
  string namespace_id = 1;
  string schema_id = 2;
  optional uint64 current_version = 3;
  optional uint64 staged_version = 4;
  google.protobuf.Timestamp created_at = 5;
  map<string, string> metadata = 6;
  repeated uint64 versions = 7;
}

// --- ListSchemas ---

message ListSchemasRequest {
  string namespace_id = 1;
  // Maximum number of schemas to return. 0 means use the server default.
  // The server may cap this; the cap is reflected in the next_page_token.
  uint32 page_size = 2;
  // Opaque token returned by a prior call's next_page_token. Empty for the
  // first page. Tokens are valid only against the same namespace.
  string page_token = 3;
}

message ListSchemasResponse {
  repeated SchemaInfo schemas = 1;
  // Token to pass as page_token in the next call to fetch more results.
  // Empty when there are no more pages.
  string next_page_token = 2;
}

// --- GetDescriptor ---

message GetDescriptorRequest {
  string namespace_id = 1;
  string schema_id = 2;
  // If 0, returns the current version.
  uint64 version = 3;
}

message GetDescriptorResponse {
  uint64 version = 1;
  google.protobuf.FileDescriptorSet file_descriptor_set = 2;
}

// --- GetSource ---

message GetSourceRequest {
  string namespace_id = 1;
  string schema_id = 2;
  // If 0, returns the current version.
  uint64 version = 3;
}

message GetSourceResponse {
  uint64 version = 1;
  // filename → source content.
  map<string, bytes> sources = 2;
}

// --- ListNamespaces ---

message ListNamespacesRequest {
  // Maximum number of namespaces to return. 0 means use the server default.
  uint32 page_size = 1;
  // Opaque token returned by a prior call's next_page_token. Empty for the
  // first page.
  string page_token = 2;
}

message ListNamespacesResponse {
  repeated NamespaceInfo namespaces = 1;
  // Token to pass as page_token in the next call to fetch more results.
  // Empty when there are no more pages.
  string next_page_token = 2;
}

message NamespaceInfo {
  string id = 1;
  google.protobuf.Timestamp created_at = 2;
  map<string, string> metadata = 3;
  // Parent namespace in the resolution chain. Unset means this namespace
  // is a root (resolution falls back to the implicit __builtins__ and
  // then to Google WKT). Wired into resolution by phase 2 of the
  // namespace-hierarchy work; see docs/design/namespace-hierarchy.md.
  optional string parent_namespace_id = 4;
}

// --- CreateNamespace ---

message CreateNamespaceRequest {
  string id = 1;
  map<string, string> metadata = 2;
  // Optional parent namespace for the resolution chain. The server
  // verifies the parent exists and that the caller is authorized to
  // create a namespace under it (see authz.CanCreateNamespace in
  // docs/design/namespace-hierarchy.md).
  optional string parent_namespace_id = 3;
}

message CreateNamespaceResponse {}

// --- SetNamespaceParent ---

message SetNamespaceParentRequest {
  string namespace_id = 1;
  // Unset clears the parent (resets the namespace to the implicit root,
  // which falls back to __builtins__ and then Google WKT).
  optional string parent_namespace_id = 2;
}

message SetNamespaceParentResponse {}

// --- GetRebaseStatus ---

message GetRebaseStatusRequest {
  string namespace_id = 1;
  string schema_id = 2;
}

message GetRebaseStatusResponse {
  // One status per cross-namespace dependency. Same-namespace deps are
  // not included. Empty when this schema has no parent-chain pins.
  repeated ParentPinStatus pin_statuses = 1;
  // True if any pin is behind the parent's current state.
  bool rebase_available = 2;
}

message ParentPinStatus {
  string parent_namespace_id = 1;
  string dep_schema_id = 2;
  string dep_filename = 3;
  uint64 pinned_version = 4;
  // Parent's current version of (dep_schema_id, dep_filename). Zero
  // when the schema or file no longer exists in the parent — in that
  // case a rebase would fail because the pinned file vanished.
  uint64 current_version = 5;
}

// --- Rebase ---

message RebaseRequest {
  string namespace_id = 1;
  string schema_id = 2;
}

message RebaseResponse {
  uint64 version = 1;
  string fingerprint = 2;
  // True when the rebase produced no change — the schema was already
  // pinned to the parent's current state.
  bool no_change = 3;
}
