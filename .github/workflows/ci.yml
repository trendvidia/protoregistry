name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  vet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: go vet ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  buf-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: bufbuild/buf-setup-action@v1
      - run: make buf-lint

  buf-format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: bufbuild/buf-setup-action@v1
      - run: make buf-format-check

  # Catches wire-format-breaking proto changes on PRs by diffing against the
  # base branch. Skipped on push events because there is no base to compare
  # against (the comparison would always be against itself).
  buf-breaking:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # buf breaking needs full history so it can resolve the base ref.
          fetch-depth: 0
      - uses: bufbuild/buf-setup-action@v1
      - run: buf breaking --against ".git#branch=${{ github.base_ref }}"

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: go build ./...

  headers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: ./scripts/add-license-header.sh --check

  # Unit tests don't need Docker (no PostgreSQL container).
  test-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: make test-unit

  # Full suite: spins up PostgreSQL via testcontainers (Docker required).
  test-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: go test (with coverage)
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...
      - name: Upload coverage profile
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out
          retention-days: 7
