# Build and publish the protoregistry container image to GitHub
# Container Registry (ghcr.io).
#
# Triggers:
#   - On tag push matching v*: publishes the versioned image
#     (e.g., v0.72.0, also a moving 0.72 major.minor tag, and
#     :latest when the tag is on the default branch).
#   - On push to main: publishes a rolling :main tag for
#     consumers who want the bleeding edge.
#   - Manual workflow_dispatch: lets us retroactively publish an
#     image for an already-existing tag (used once after this
#     workflow lands to backfill v0.72.0 without bumping).
#
# Image: ghcr.io/trendvidia/protoregistry
# Architectures: linux/amd64 + linux/arm64 (the latter for
# Mac developers running locally via Docker Desktop).

name: Publish container image

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build and tag (defaults to the workflow ref).'
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          # github.repository is "trendvidia/protoregistry" — ghcr
          # uses the same path as the GitHub repo so this works
          # without further mapping.
          images: ghcr.io/${{ github.repository }}
          tags: |
            # On a tag push (e.g., refs/tags/v0.72.0):
            #   - "v0.72.0" (full semver)
            #   - "0.72" (major.minor — moves forward on each patch)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # On main: "main" rolling tag.
            type=ref,event=branch
            # `latest` only on the default branch's tag pushes —
            # never on main (so a green main can't accidentally
            # overwrite the latest release pointer).
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' && github.event.base_ref == 'refs/heads/main' }}

      - name: Build + push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GHA cache reuses layers between runs — biggest win is
          # the Go-module-download step staying cached across
          # rebuilds.
          cache-from: type=gha
          cache-to: type=gha,mode=max
